stages:
  - .pre
  - lint
  - test
  - build
  - docker_build
  - deploy

variables:
  DOCKER_TLS_CERTDIR: ""
  IMAGE_TAG: $CI_COMMIT_SHA
  K8S_NAMESPACE: "springcrm-prod"
  SMOKE_TEST_RETRIES: "12"
  SMOKE_TEST_DELAY_SECONDS: "5"

default:
  interruptible: true
  retry: 1

# ---------- CHANGE DETECTION ----------

detect_changes:
  stage: .pre
  image: alpine/git:latest
  script:
    - |
      echo "Detecting changed services..."
      
      # Get the base ref for comparison
      if [ "$CI_COMMIT_BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
        # First commit in branch, compare with main
        BASE_REF="origin/main"
      else
        BASE_REF="$CI_COMMIT_BEFORE_SHA"
      fi
      
      echo "Comparing against: $BASE_REF"
      
      # Get changed files
      CHANGED_FILES=$(git diff --name-only $BASE_REF..$CI_COMMIT_SHA || echo "")
      
      echo "Changed files:"
      echo "$CHANGED_FILES"
      
      # Initialize flags
      CHANGED_AUTH=false
      CHANGED_CRM=false
      CHANGED_GATEWAY=false
      CHANGED_SHARED=false
      CHANGED_FRONTEND=false
      
      # Analyze changes
      for file in $CHANGED_FILES; do
        case "$file" in
          backend/shared-lib/*)
            CHANGED_SHARED=true
            ;;
          backend/auth-service/*)
            CHANGED_AUTH=true
            ;;
          backend/crm-service/*)
            CHANGED_CRM=true
            ;;
          backend/api-gateway/*)
            CHANGED_GATEWAY=true
            ;;
          frontend/*)
            CHANGED_FRONTEND=true
            ;;
        esac
      done
      
      # If shared-lib changed, all backend services are affected
      if [ "$CHANGED_SHARED" = "true" ]; then
        CHANGED_AUTH=true
        CHANGED_CRM=true
        CHANGED_GATEWAY=true
      fi
      
      # Export to dotenv file for downstream jobs
      echo "CHANGED_AUTH=$CHANGED_AUTH" >> detect.env
      echo "CHANGED_CRM=$CHANGED_CRM" >> detect.env
      echo "CHANGED_GATEWAY=$CHANGED_GATEWAY" >> detect.env
      echo "CHANGED_SHARED=$CHANGED_SHARED" >> detect.env
      echo "CHANGED_FRONTEND=$CHANGED_FRONTEND" >> detect.env
      
      echo ""
      echo "📊 Change detection results:"
      echo "  CHANGED_AUTH=$CHANGED_AUTH"
      echo "  CHANGED_CRM=$CHANGED_CRM"
      echo "  CHANGED_GATEWAY=$CHANGED_GATEWAY"
      echo "  CHANGED_SHARED=$CHANGED_SHARED"
      echo "  CHANGED_FRONTEND=$CHANGED_FRONTEND"
  artifacts:
    reports:
      dotenv: detect.env
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_COMMIT_BRANCH == "main"

# ---------- LINT ----------

lint_backend:
  stage: lint
  image: maven:3.9-eclipse-temurin-21
  script:
    - cd backend
    - mvn -B -DskipTests validate

lint_frontend:
  stage: lint
  image: node:20-alpine
  script:
    - cd frontend
    - npm ci
    - npm run lint

# ---------- TEST ----------

test_auth_service:
  stage: test
  image: maven:3.9-eclipse-temurin-21
  script:
    - cd backend
    - mvn -B test -pl auth-service -am
  artifacts:
    when: always
    reports:
      junit:
        - backend/auth-service/target/surefire-reports/*.xml
  rules:
    - if: $CHANGED_AUTH == "true"
    - changes:
      - backend/auth-service/**/*
      - backend/shared-lib/**/*
  needs: ["detect_changes"]

test_crm_service:
  stage: test
  image: maven:3.9-eclipse-temurin-21
  script:
    - cd backend
    - mvn -B test -pl crm-service -am
  artifacts:
    when: always
    reports:
      junit:
        - backend/crm-service/target/surefire-reports/*.xml
  rules:
    - if: $CHANGED_CRM == "true"
    - changes:
      - backend/crm-service/**/*
      - backend/shared-lib/**/*
  needs: ["detect_changes"]

test_api_gateway:
  stage: test
  image: maven:3.9-eclipse-temurin-21
  script:
    - cd backend
    - mvn -B test -pl api-gateway -am
  artifacts:
    when: always
    reports:
      junit:
        - backend/api-gateway/target/surefire-reports/*.xml
  rules:
    - if: $CHANGED_GATEWAY == "true"
    - changes:
      - backend/api-gateway/**/*
      - backend/shared-lib/**/*
  needs: ["detect_changes"]

test_backend_integration:
  stage: test
  image: maven:3.9-eclipse-temurin-21
  script:
    - cd backend
    - mvn -B verify -DskipUnitTests=true
  artifacts:
    when: always
    reports:
      junit:
        - backend/**/target/failsafe-reports/*.xml
  rules:
    - if: $CHANGED_AUTH == "true" || $CHANGED_CRM == "true" || $CHANGED_GATEWAY == "true" || $CHANGED_SHARED == "true"
    - changes:
      - backend/**/*
  needs: ["detect_changes"]

test_frontend_unit:
  stage: test
  image: node:20-alpine
  script:
    - cd frontend
    - npm ci
    - npm run test:coverage -- --run
  artifacts:
    when: always
    paths:
      - frontend/coverage
    reports:
      coverage_report:
        coverage_format: cobertura
        path: frontend/coverage/cobertura-coverage.xml
  coverage: '/Lines\s*:\s*(\d+\.?\d*)%/'
  rules:
    - if: $CHANGED_FRONTEND == "true"
    - changes:
      - frontend/**/*
  needs: ["detect_changes"]

test_frontend_e2e:
  stage: test
  image: node:20-alpine
  script:
    - cd frontend
    - npm ci
    - npm run test:e2e --if-present
  rules:
    - if: $CHANGED_FRONTEND == "true"
    - changes:
      - frontend/**/*
  needs: ["detect_changes"]

# ---------- BUILD ----------

build_auth_service:
  stage: build
  image: maven:3.9-eclipse-temurin-21
  script:
    - cd backend
    - mvn -B -DskipTests clean package -pl auth-service -am
  artifacts:
    paths:
      - backend/auth-service/target/*.jar
    expire_in: 1 hour
  rules:
    - if: $CHANGED_AUTH == "true"
    - changes:
      - backend/auth-service/**/*
      - backend/shared-lib/**/*
  needs: ["detect_changes"]

build_crm_service:
  stage: build
  image: maven:3.9-eclipse-temurin-21
  script:
    - cd backend
    - mvn -B -DskipTests clean package -pl crm-service -am
  artifacts:
    paths:
      - backend/crm-service/target/*.jar
    expire_in: 1 hour
  rules:
    - if: $CHANGED_CRM == "true"
    - changes:
      - backend/crm-service/**/*
      - backend/shared-lib/**/*
  needs: ["detect_changes"]

build_api_gateway:
  stage: build
  image: maven:3.9-eclipse-temurin-21
  script:
    - cd backend
    - mvn -B -DskipTests clean package -pl api-gateway -am
  artifacts:
    paths:
      - backend/api-gateway/target/*.jar
    expire_in: 1 hour
  rules:
    - if: $CHANGED_GATEWAY == "true"
    - changes:
      - backend/api-gateway/**/*
      - backend/shared-lib/**/*
  needs: ["detect_changes"]

build_frontend:
  stage: build
  image: node:20-alpine
  script:
    - cd frontend
    - npm ci
    - npm run build
  artifacts:
    paths:
      - frontend/.next
    expire_in: 1 hour
  rules:
    - if: $CHANGED_FRONTEND == "true"
    - changes:
      - frontend/**/*
  needs: ["detect_changes"]

# ---------- DOCKER BUILD + PUSH ----------

docker_build_auth_service:
  stage: docker_build
  image: docker:27
  services:
    - docker:27-dind
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build -t $CI_REGISTRY_IMAGE/auth-service:$IMAGE_TAG backend/auth-service
    - docker push $CI_REGISTRY_IMAGE/auth-service:$IMAGE_TAG
  rules:
    - if: $CHANGED_AUTH == "true"
    - changes:
      - backend/auth-service/**/*
      - backend/shared-lib/**/*
  needs: 
    - job: detect_changes
    - job: build_auth_service

docker_build_crm_service:
  stage: docker_build
  image: docker:27
  services:
    - docker:27-dind
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build -t $CI_REGISTRY_IMAGE/crm-service:$IMAGE_TAG backend/crm-service
    - docker push $CI_REGISTRY_IMAGE/crm-service:$IMAGE_TAG
  rules:
    - if: $CHANGED_CRM == "true"
    - changes:
      - backend/crm-service/**/*
      - backend/shared-lib/**/*
  needs: 
    - job: detect_changes
    - job: build_crm_service

docker_build_api_gateway:
  stage: docker_build
  image: docker:27
  services:
    - docker:27-dind
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build -t $CI_REGISTRY_IMAGE/api-gateway:$IMAGE_TAG backend/api-gateway
    - docker push $CI_REGISTRY_IMAGE/api-gateway:$IMAGE_TAG
  rules:
    - if: $CHANGED_GATEWAY == "true"
    - changes:
      - backend/api-gateway/**/*
      - backend/shared-lib/**/*
  needs: 
    - job: detect_changes
    - job: build_api_gateway

docker_build_frontend:
  stage: docker_build
  image: docker:27
  services:
    - docker:27-dind
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build -t $CI_REGISTRY_IMAGE/frontend:$IMAGE_TAG frontend
    - docker push $CI_REGISTRY_IMAGE/frontend:$IMAGE_TAG
  rules:
    - if: $CHANGED_FRONTEND == "true"
    - changes:
      - frontend/**/*
  needs: 
    - job: detect_changes
    - job: build_frontend

# ---------- DEPLOY ----------

deploy_staging:
  stage: deploy
  only:
    - develop
  script:
    - chmod +x ./devops/scripts/deploy.sh
    - ./devops/scripts/deploy.sh staging $IMAGE_TAG

.deploy_production_blue_green_template:
  stage: deploy
  only:
    - main
  when: manual
  script:
    - chmod +x ./devops/scripts/deploy-blue-green.sh
    - export K8S_NAMESPACE="$K8S_NAMESPACE"
    - export K8S_DEPLOYMENT_NAME="$DEPLOY_WORKLOAD"
    - export K8S_CONTAINER_NAME="$DEPLOY_WORKLOAD"
    - export REGISTRY_IMAGE="$CI_REGISTRY_IMAGE/$DEPLOY_WORKLOAD"
    - export SMOKE_TEST_RETRIES="$SMOKE_TEST_RETRIES"
    - export SMOKE_TEST_DELAY_SECONDS="$SMOKE_TEST_DELAY_SECONDS"
    - |
      case "$DEPLOY_WORKLOAD" in
        auth-service) export SMOKE_TEST_URL="$AUTH_SMOKE_TEST_URL" ;;
        crm-service) export SMOKE_TEST_URL="$CRM_SMOKE_TEST_URL" ;;
        api-gateway) export SMOKE_TEST_URL="$GATEWAY_SMOKE_TEST_URL" ;;
        frontend) export SMOKE_TEST_URL="$FRONTEND_SMOKE_TEST_URL" ;;
        *) echo "Unknown DEPLOY_WORKLOAD: $DEPLOY_WORKLOAD"; exit 1 ;;
      esac
    - ./devops/scripts/deploy-blue-green.sh production "$IMAGE_TAG"

deploy_production_auth_service:
  extends: .deploy_production_blue_green_template
  variables:
    DEPLOY_WORKLOAD: "auth-service"

deploy_production_crm_service:
  extends: .deploy_production_blue_green_template
  variables:
    DEPLOY_WORKLOAD: "crm-service"

deploy_production_api_gateway:
  extends: .deploy_production_blue_green_template
  variables:
    DEPLOY_WORKLOAD: "api-gateway"

deploy_production_frontend:
  extends: .deploy_production_blue_green_template
  variables:
    DEPLOY_WORKLOAD: "frontend"

.rollback_production_template:
  stage: deploy
  only:
    - main
  when: manual
  script:
    - chmod +x ./devops/scripts/rollback.sh
    - export K8S_NAMESPACE="$K8S_NAMESPACE"
    - export K8S_DEPLOYMENT_NAME="$ROLLBACK_WORKLOAD"
    - ./devops/scripts/rollback.sh production

rollback_production_auth_service:
  extends: .rollback_production_template
  variables:
    ROLLBACK_WORKLOAD: "auth-service"

rollback_production_crm_service:
  extends: .rollback_production_template
  variables:
    ROLLBACK_WORKLOAD: "crm-service"

rollback_production_api_gateway:
  extends: .rollback_production_template
  variables:
    ROLLBACK_WORKLOAD: "api-gateway"

rollback_production_frontend:
  extends: .rollback_production_template
  variables:
    ROLLBACK_WORKLOAD: "frontend"
