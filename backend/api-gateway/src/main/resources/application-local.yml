spring:
  data:
    redis:
      host: localhost
      port: 6379

  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/auth/**, /api/v1/users/**, /api/v1/roles/**, /api/v1/claims/**, /api/v1/permissions/**
        - id: crm-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/crm/**
        - id: health
          uri: http://localhost:8081
          predicates:
            - Path=/actuator/health

logging:
  level:
    com.company.platform: DEBUG
    org.springframework.cloud.gateway: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway,metrics,prometheus
  endpoint:
    health:
      show-details: always