spring:
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    
  datasource:
    url: jdbc:postgresql://localhost:5432/crm_platform
    username: crm_user
    password: crm_password
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: localhost
      port: 6379

jwt:
  issuer: crm-platform-local
  secret: dev-jwt-secret-for-local-development-only-not-for-production-use

logging:
  level:
    com.company.platform: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always