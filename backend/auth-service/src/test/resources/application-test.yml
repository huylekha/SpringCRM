spring:
  application:
    name: auth-service-test

  flyway:
    enabled: false

  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  data:
    redis:
      host: localhost
      port: 6379

jwt:
  issuer: test-issuer
  secret: test-jwt-secret-key-for-unit-tests-must-be-at-least-64-characters-long!!!!!
  access-token-expiry: 900
  refresh-token-expiry: 604800
