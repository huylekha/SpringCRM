# Bean Validation Messages
# Username
VALIDATION_USERNAME_REQUIRED=Username is required
VALIDATION_USERNAME_SIZE=Username must be between {min} and {max} characters
VALIDATION_USERNAME_FORMAT=Username can only contain letters, numbers and underscores

# Email
VALIDATION_EMAIL_REQUIRED=Email is required
VALIDATION_EMAIL_FORMAT=Invalid email format

# Password
VALIDATION_PASSWORD_REQUIRED=Password is required
VALIDATION_PASSWORD_MIN_LENGTH=Password must be at least {min} characters
VALIDATION_PASSWORD_COMPLEXITY=Password must contain uppercase, lowercase, number and special character

# Name
VALIDATION_NAME_REQUIRED=Name is required
VALIDATION_FULLNAME_REQUIRED=Full name is required
VALIDATION_FIRSTNAME_REQUIRED=First name is required
VALIDATION_LASTNAME_REQUIRED=Last name is required

# Phone
VALIDATION_PHONE_REQUIRED=Phone number is required
VALIDATION_PHONE_FORMAT=Invalid phone number format

# Address
VALIDATION_ADDRESS_REQUIRED=Address is required
VALIDATION_CITY_REQUIRED=City is required
VALIDATION_STATE_REQUIRED=State is required
VALIDATION_COUNTRY_REQUIRED=Country is required
VALIDATION_POSTAL_CODE_REQUIRED=Postal code is required
VALIDATION_POSTAL_CODE_FORMAT=Invalid postal code format

# Role/Permission
VALIDATION_ROLE_CODE_REQUIRED=Role code is required
VALIDATION_ROLE_NAME_REQUIRED=Role name is required
VALIDATION_PERMISSION_CODE_REQUIRED=Permission code is required
VALIDATION_PERMISSION_NAME_REQUIRED=Permission name is required
VALIDATION_CLAIM_CODE_REQUIRED=Claim code is required
VALIDATION_CLAIM_VALUE_REQUIRED=Claim value is required
VALIDATION_DESCRIPTION_SIZE=Description must be at most {max} characters

# Token
VALIDATION_TOKEN_REQUIRED=Token is required
VALIDATION_REFRESH_TOKEN_REQUIRED=Refresh token is required

# List/Collection
VALIDATION_LIST_NOT_EMPTY=List cannot be empty

# Pagination
VALIDATION_PAGE_MIN=Page must be at least {value}
VALIDATION_SIZE_MIN=Size must be at least {value}
VALIDATION_SIZE_MAX=Size must be at most {value}

# Status
VALIDATION_STATUS_REQUIRED=Status is required
VALIDATION_STATUS_INVALID=Invalid status value

# Generic
VALIDATION_FIELD_REQUIRED={field} is required
VALIDATION_FIELD_SIZE={field} must be between {min} and {max} characters
VALIDATION_FIELD_MIN={field} must be at least {value}
VALIDATION_FIELD_MAX={field} must be at most {value}
VALIDATION_FIELD_PATTERN={field} format is invalid
