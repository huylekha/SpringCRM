# Bean Validation Messages
# Username
VALIDATION_USERNAME_REQUIRED=用户名为必填项
VALIDATION_USERNAME_SIZE=用户名必须在{min}到{max}个字符之间
VALIDATION_USERNAME_FORMAT=用户名只能包含字母、数字和下划线

# Email
VALIDATION_EMAIL_REQUIRED=电子邮件为必填项
VALIDATION_EMAIL_FORMAT=无效的电子邮件格式

# Password
VALIDATION_PASSWORD_REQUIRED=密码为必填项
VALIDATION_PASSWORD_MIN_LENGTH=密码必须至少{min}个字符
VALIDATION_PASSWORD_COMPLEXITY=密码必须包含大写字母、小写字母、数字和特殊字符

# Name
VALIDATION_NAME_REQUIRED=姓名为必填项
VALIDATION_FULLNAME_REQUIRED=全名为必填项
VALIDATION_FIRSTNAME_REQUIRED=名字为必填项
VALIDATION_LASTNAME_REQUIRED=姓氏为必填项

# Phone
VALIDATION_PHONE_REQUIRED=电话号码为必填项
VALIDATION_PHONE_FORMAT=无效的电话号码格式

# Address
VALIDATION_ADDRESS_REQUIRED=地址为必填项
VALIDATION_CITY_REQUIRED=城市为必填项
VALIDATION_STATE_REQUIRED=省/州为必填项
VALIDATION_COUNTRY_REQUIRED=国家为必填项
VALIDATION_POSTAL_CODE_REQUIRED=邮政编码为必填项
VALIDATION_POSTAL_CODE_FORMAT=无效的邮政编码格式

# Role/Permission
VALIDATION_ROLE_CODE_REQUIRED=角色代码为必填项
VALIDATION_ROLE_NAME_REQUIRED=角色名称为必填项
VALIDATION_PERMISSION_CODE_REQUIRED=权限代码为必填项
VALIDATION_PERMISSION_NAME_REQUIRED=权限名称为必填项
VALIDATION_CLAIM_CODE_REQUIRED=声明代码为必填项
VALIDATION_CLAIM_VALUE_REQUIRED=声明值为必填项
VALIDATION_DESCRIPTION_SIZE=描述最多为{max}个字符

# Token
VALIDATION_TOKEN_REQUIRED=令牌为必填项
VALIDATION_REFRESH_TOKEN_REQUIRED=刷新令牌为必填项

# List/Collection
VALIDATION_LIST_NOT_EMPTY=列表不能为空

# Pagination
VALIDATION_PAGE_MIN=页码至少为{value}
VALIDATION_SIZE_MIN=大小至少为{value}
VALIDATION_SIZE_MAX=大小最多为{value}

# Status
VALIDATION_STATUS_REQUIRED=状态为必填项
VALIDATION_STATUS_INVALID=无效的状态值

# Generic
VALIDATION_FIELD_REQUIRED={field}为必填项
VALIDATION_FIELD_SIZE={field}必须在{min}到{max}个字符之间
VALIDATION_FIELD_MIN={field}至少为{value}
VALIDATION_FIELD_MAX={field}最多为{value}
VALIDATION_FIELD_PATTERN={field}格式无效
