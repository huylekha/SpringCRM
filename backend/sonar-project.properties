# Project identification
sonar.projectKey=springcrm-backend
sonar.projectName=SpringCRM Backend
sonar.projectVersion=0.0.1-SNAPSHOT

# Source and test paths
sonar.sources=auth-service/src/main/java,crm-service/src/main/java,api-gateway/src/main/java,shared-lib/src/main/java
sonar.tests=auth-service/src/test/java,crm-service/src/test/java,api-gateway/src/test/java,shared-lib/src/test/java

# Binary paths
sonar.java.binaries=auth-service/target/classes,crm-service/target/classes,api-gateway/target/classes,shared-lib/target/classes

# Test binary paths
sonar.java.test.binaries=auth-service/target/test-classes,crm-service/target/test-classes,api-gateway/target/test-classes,shared-lib/target/test-classes

# Coverage
sonar.coverage.jacoco.xmlReportPaths=**/target/site/jacoco/jacoco.xml
sonar.junit.reportPaths=**/target/surefire-reports

# Exclusions
sonar.coverage.exclusions=**/*Test.java,**/*Config.java,**/dto/**,**/entity/**,**/Application.java
sonar.cpd.exclusions=**/dto/**,**/entity/**
sonar.exclusions=**/target/**

# Quality Gate
sonar.qualitygate.wait=true

# Java version
sonar.java.source=21
sonar.java.target=21

# Encoding
sonar.sourceEncoding=UTF-8
