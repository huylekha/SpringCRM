version: "3.9"

services:
  mysql:
    image: mysql:8.4
    container_name: crm-mysql
    environment:
      MYSQL_DATABASE: crm_platform
      MYSQL_USER: crm_user
      MYSQL_PASSWORD: crm_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - crm_network

  redis:
    image: redis:7-alpine
    container_name: crm-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - crm_network

  auth-service:
    build:
      context: ../../backend/auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SERVER_PORT: 8081
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: crm_platform
      DB_USER: crm_user
      DB_PASSWORD: crm_password
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_ISSUER: crm-platform
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY:-replace_me}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:-replace_me}
      SENTRY_DSN: ${SENTRY_DSN:-}
    ports:
      - "8081:8081"
    networks:
      - crm_network

  crm-service:
    build:
      context: ../../backend/crm-service
      dockerfile: Dockerfile
    container_name: crm-service
    depends_on:
      mysql:
        condition: service_healthy
      auth-service:
        condition: service_started
    environment:
      SERVER_PORT: 8082
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: crm_platform
      DB_USER: crm_user
      DB_PASSWORD: crm_password
      AUTH_SERVICE_URL: http://auth-service:8081
      SENTRY_DSN: ${SENTRY_DSN:-}
    ports:
      - "8082:8082"
    networks:
      - crm_network

  api-gateway:
    build:
      context: ../../backend/api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    depends_on:
      auth-service:
        condition: service_started
      crm-service:
        condition: service_started
      redis:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: docker
      AUTH_SERVICE_URL: http://auth-service:8081
      CRM_SERVICE_URL: http://crm-service:8082
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SENTRY_DSN: ${SENTRY_DSN:-}
    ports:
      - "8080:8080"
    networks:
      - crm_network

  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    container_name: crm-frontend
    depends_on:
      api-gateway:
        condition: service_started
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080/api/v1
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-replace_me}
      SENTRY_DSN: ${SENTRY_DSN:-}
    ports:
      - "3000:3000"
    networks:
      - crm_network

networks:
  crm_network:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
