  /crm/notes/search:
    post:
      tags: [Notes]
      summary: Advanced note search
      operationId: searchNotes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchRequest'
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedNoteResponse'
        '400':
          $ref: '#/components/responses/ValidationError'

  /crm/notes/{id}:
    get:
      tags: [Notes]
      summary: Get note by ID
      operationId: getNote
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Note details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NoteResponse'
        '404':
          $ref: '#/components/responses/NotFoundError'
    put:
      tags: [Notes]
      summary: Update note
      operationId: updateNote
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateNoteRequest'
      responses:
        '200':
          description: Note updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NoteResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFoundError'
    delete:
      tags: [Notes]
      summary: Soft-delete note
      operationId: deleteNote
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '204':
          description: Note soft-deleted
        '404':
          $ref: '#/components/responses/NotFoundError'

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    IdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PageParam:
      name: page
      in: query
      schema:
        type: integer
        default: 0
        minimum: 0
    SizeParam:
      name: size
      in: query
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100
    SortParam:
      name: sort
      in: query
      schema:
        type: string
        example: createdAt,desc

  responses:
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ConflictError:
      description: Duplicate resource
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    BusinessRuleError:
      description: Business rule violation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFoundError:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    # ──── Shared ────
    SearchRequest:
      type: object
      properties:
        filters:
          type: array
          items:
            $ref: '#/components/schemas/SearchFilter'
        sort:
          type: array
          items:
            $ref: '#/components/schemas/SearchSort'
        page:
          type: integer
          default: 0
        size:
          type: integer
          default: 20
          maximum: 100

    SearchFilter:
      type: object
      required: [field, operator, value]
      properties:
        field:
          type: string
        operator:
          type: string
