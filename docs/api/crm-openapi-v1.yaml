      responses:
        '201':
          description: Activity created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivityResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '422':
          $ref: '#/components/responses/BusinessRuleError'
    get:
      tags: [Activities]
      summary: List activities with pagination
      operationId: listActivities
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [CALL, MEETING, EMAIL, DEMO]
        - name: customerId
          in: query
          schema:
            type: string
            format: uuid
        - name: leadId
          in: query
          schema:
            type: string
            format: uuid
        - name: opportunityId
          in: query
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - $ref: '#/components/parameters/SortParam'
      responses:
