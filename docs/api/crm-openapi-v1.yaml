        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '422':
          $ref: '#/components/responses/BusinessRuleError'
    get:
      tags: [Leads]
      summary: List leads with pagination
      operationId: listLeads
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [NEW, QUALIFIED, PROPOSAL, CONVERTED, LOST]
        - name: priority
          in: query
          schema:
            type: string
            enum: [LOW, MEDIUM, HIGH, CRITICAL]
        - name: ownerUserId
          in: query
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - $ref: '#/components/parameters/SortParam'
      responses:
        '200':
          description: Paginated lead list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedLeadResponse'
        '400':
          $ref: '#/components/responses/ValidationError'

  /crm/leads/search:
    post:
      tags: [Leads]
      summary: Advanced lead search
      operationId: searchLeads
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchRequest'
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedLeadResponse'
        '400':
          $ref: '#/components/responses/ValidationError'

  /crm/leads/{id}:
    get:
      tags: [Leads]
      summary: Get lead by ID
      operationId: getLead
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Lead details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeadDetailResponse'
        '404':
          $ref: '#/components/responses/NotFoundError'
    put:
      tags: [Leads]
      summary: Update lead
      operationId: updateLead
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateLeadRequest'
      responses:
        '200':
          description: Lead updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeadDetailResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '422':
          $ref: '#/components/responses/BusinessRuleError'
    delete:
      tags: [Leads]
      summary: Soft-delete lead
      operationId: deleteLead
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '204':
          description: Lead soft-deleted
        '404':
          $ref: '#/components/responses/NotFoundError'

  /crm/leads/{id}/qualify:
    post:
      tags: [Leads]
      summary: Qualify lead (NEW -> QUALIFIED)
      operationId: qualifyLead
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Lead qualified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeadTransitionResponse'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '422':
          $ref: '#/components/responses/BusinessRuleError'

  /crm/leads/{id}/convert:
    post:
      tags: [Leads]
      summary: Convert lead to customer + opportunity
      operationId: convertLead
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConvertLeadRequest'
      responses:
        '200':
          description: Lead converted
          content:
