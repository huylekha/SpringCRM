            format: uuid
        - name: leadId
          in: query
          schema:
            type: string
            format: uuid
        - name: opportunityId
          in: query
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - $ref: '#/components/parameters/SortParam'
      responses:
        '200':
          description: Paginated note list
          content:
