openapi: 3.0.3
info:
  title: CRM Service API
  description: CRM domain API for customer, lead, opportunity, activity, task, and note management.
  version: 1.0.0
  contact:
    name: Platform Engineering Team

servers:
  - url: http://localhost:8080/api/v1
    description: Local development (via API Gateway)
  - url: http://localhost:8082/api/v1
    description: CRM service direct access

tags:
  - name: Customers
    description: Customer lifecycle management
  - name: Leads
    description: Lead lifecycle and conversion
  - name: Opportunities
    description: Opportunity pipeline management
  - name: Activities
    description: Activity logging (append-only)
  - name: Tasks
    description: Task lifecycle management
  - name: Notes
    description: Note management

paths:
  # ──────────────────── CUSTOMER ────────────────────
  /crm/customers:
    post:
      tags: [Customers]
      summary: Create customer
      operationId: createCustomer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCustomerRequest'
      responses:
        '201':
          description: Customer created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '422':
          $ref: '#/components/responses/BusinessRuleError'
    get:
      tags: [Customers]
      summary: List customers with pagination
      operationId: listCustomers
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [ACTIVE, INACTIVE, SUSPENDED]
        - name: ownerUserId
          in: query
          schema:
            type: string
            format: uuid
        - name: source
          in: query
          schema:
            type: string
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - $ref: '#/components/parameters/SortParam'
      responses:
        '200':
          description: Paginated customer list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedCustomerResponse'
        '400':
          $ref: '#/components/responses/ValidationError'

  /crm/customers/search:
    post:
      tags: [Customers]
      summary: Advanced customer search
      operationId: searchCustomers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchRequest'
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedCustomerResponse'
        '400':
          $ref: '#/components/responses/ValidationError'

  /crm/customers/{id}:
    get:
      tags: [Customers]
      summary: Get customer by ID
      operationId: getCustomer
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Customer details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerDetailResponse'
        '404':
          $ref: '#/components/responses/NotFoundError'
    put:
      tags: [Customers]
      summary: Update customer
      operationId: updateCustomer
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCustomerRequest'
      responses:
        '200':
          description: Customer updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerDetailResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '422':
          $ref: '#/components/responses/BusinessRuleError'
    delete:
      tags: [Customers]
      summary: Soft-delete customer
      operationId: deleteCustomer
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '204':
          description: Customer soft-deleted
        '404':
          $ref: '#/components/responses/NotFoundError'
        '422':
          $ref: '#/components/responses/BusinessRuleError'

  /crm/customers/{id}/status:
    patch:
      tags: [Customers]
      summary: Update customer status
      operationId: updateCustomerStatus
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StatusUpdateRequest'
      responses:
        '200':
          description: Status updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerDetailResponse'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '422':
          $ref: '#/components/responses/BusinessRuleError'

  # ──────────────────── LEAD ────────────────────
