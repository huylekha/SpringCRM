apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: springcrm-dev
  namespace: argocd
  labels:
    app.kubernetes.io/name: springcrm-dev
    app.kubernetes.io/part-of: springcrm
    environment: dev
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: springcrm
  source:
    repoURL: https://github.com/huylekha/SpringCRM.git
    targetRevision: HEAD
    path: k8s/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
    - CreateNamespace=true
    - PrunePropagationPolicy=foreground
    - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  revisionHistoryLimit: 10
  info:
  - name: 'Environment'
    value: 'Development'
  - name: 'Team'
    value: 'SpringCRM Development Team'
  - name: 'Description'
    value: 'SpringCRM Development Environment - Auto-synced from k8s/overlays/dev'