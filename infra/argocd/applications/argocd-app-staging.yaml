apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: springcrm-staging
  namespace: argocd
  labels:
    app.kubernetes.io/name: springcrm-staging
    app.kubernetes.io/part-of: springcrm
    environment: staging
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: springcrm
  source:
    repoURL: https://github.com/huylekha/SpringCRM.git
    targetRevision: HEAD
    path: k8s/overlays/staging
  destination:
    server: https://kubernetes.default.svc
    namespace: staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
    - CreateNamespace=true
    - PrunePropagationPolicy=foreground
    - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  # Ignore differences in Secret data to allow manual secret management
  ignoreDifferences:
  - group: ""
    kind: Secret
    jsonPointers:
    - /data
    - /stringData
  revisionHistoryLimit: 10
  info:
  - name: 'Environment'
    value: 'Staging'
  - name: 'Team'
    value: 'SpringCRM Development Team'
  - name: 'Description'
    value: 'SpringCRM Staging Environment - Auto-synced from k8s/overlays/staging'