# Horizontal Pod Autoscaler for auth-service
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: auth-service-hpa
  labels:
    app: auth-service
    component: backend
    tier: service
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment  # Change to 'Rollout' if using Argo Rollouts
    name: auth-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
  # CPU-based scaling
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70  # Scale up when CPU > 70%
  
  # Memory-based scaling
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80  # Scale up when memory > 80%
  
  # Custom metrics (requires metrics server and custom metrics API)
  - type: Pods
    pods:
      metric:
        name: http_requests_per_second
      target:
        type: AverageValue
        averageValue: "100"  # Scale up when > 100 RPS per pod
  
  # External metrics (requires external metrics API)
  - type: External
    external:
      metric:
        name: queue_length
        selector:
          matchLabels:
            queue: auth-service-queue
      target:
        type: AverageValue
        averageValue: "10"  # Scale up when queue length > 10
  
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60    # Wait 60s before scaling up again
      policies:
      - type: Percent
        value: 100    # Max 100% increase (double pods)
        periodSeconds: 60
      - type: Pods
        value: 2      # Max 2 pods added per period
        periodSeconds: 60
      selectPolicy: Min  # Use the more conservative policy
    
    scaleDown:
      stabilizationWindowSeconds: 300   # Wait 5 minutes before scaling down
      policies:
      - type: Percent
        value: 50     # Max 50% decrease (half pods)
        periodSeconds: 60
      - type: Pods
        value: 1      # Max 1 pod removed per period
        periodSeconds: 60
      selectPolicy: Min  # Use the more conservative policy

---
# Pod Disruption Budget to ensure availability during scaling
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: auth-service-pdb
  labels:
    app: auth-service
    component: backend
spec:
  minAvailable: 1  # Always keep at least 1 pod running
  selector:
    matchLabels:
      app: auth-service