apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-service-config
  labels:
    app: auth-service
    component: backend
data:
  SPRING_PROFILES_ACTIVE: "k8s,postgres"
  DB_HOST: "postgres"
  DB_PORT: "5432"
  DB_NAME: "springcrm_auth"
  DB_USER: "crm_user"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  JWT_ISSUER: "crm-platform"