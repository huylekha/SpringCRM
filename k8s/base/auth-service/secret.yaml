apiVersion: v1
kind: Secret
metadata:
  name: auth-service-secret
  labels:
    app: auth-service
    component: backend
type: Opaque
stringData:
  DB_PASSWORD: "crm_password"  # Will be overridden by overlays
  JWT_SECRET: "dev-jwt-secret-key-for-development-must-be-at-least-64-chars-long!!"  # Will be overridden
  SENTRY_DSN: ""  # Optional, will be overridden by overlays