apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- auth-service
- crm-service
- api-gateway
- frontend
- postgres
- redis
- ingress
- network-policy.yaml

commonLabels:
  app.kubernetes.io/part-of: springcrm
  app.kubernetes.io/managed-by: kustomize

images:
- name: localhost:5000/auth-service
  newTag: latest
- name: localhost:5000/crm-service
  newTag: latest
- name: localhost:5000/api-gateway
  newTag: latest
- name: localhost:5000/frontend
  newTag: latest