apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: springcrm-network-policy
  labels:
    app: springcrm
    component: security
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: springcrm
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow ingress from nginx ingress controller
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
  # Allow inter-service communication within the same namespace
  - from:
    - podSelector:
        matchLabels:
          app.kubernetes.io/part-of: springcrm
  egress:
  # Allow egress to DNS
  - to: []
    ports:
    - protocol: UDP
      port: 53
  # Allow egress to other services in the same namespace
  - to:
    - podSelector:
        matchLabels:
          app.kubernetes.io/part-of: springcrm
  # Allow egress to internet (for external APIs, if needed)
  - to: []
    ports:
    - protocol: TCP
      port: 80
    - protocol: TCP
      port: 443