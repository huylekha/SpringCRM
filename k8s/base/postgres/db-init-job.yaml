apiVersion: batch/v1
kind: Job
metadata:
  name: postgres-db-init
  labels:
    app: postgres
    component: database
    job-type: db-init
spec:
  template:
    metadata:
      labels:
        app: postgres
        component: database
        job-type: db-init
    spec:
      restartPolicy: OnFailure
      containers:
      - name: db-init
        image: postgres:15-alpine
        env:
        - name: PGHOST
          value: "postgres"
        - name: PGPORT
          value: "5432"
        - name: PGUSER
          valueFrom:
            configMapKeyRef:
              name: postgres-config
              key: POSTGRES_USER
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_PASSWORD
        command:
        - /bin/sh
        - -c
        - |
          set -e
          echo "Waiting for PostgreSQL to be ready..."
          until pg_isready -h $PGHOST -p $PGPORT -U $PGUSER; do
            echo "PostgreSQL is not ready yet. Waiting..."
            sleep 2
          done
          echo "PostgreSQL is ready. Creating databases if they don't exist..."
          
          # Create springcrm_auth database if it doesn't exist
          psql -h $PGHOST -p $PGPORT -U $PGUSER -d postgres -tc "SELECT 1 FROM pg_database WHERE datname = 'springcrm_auth'" | grep -q 1 || {
            echo "Creating springcrm_auth database..."
            psql -h $PGHOST -p $PGPORT -U $PGUSER -d postgres -c "CREATE DATABASE springcrm_auth OWNER $PGUSER;"
            echo "springcrm_auth database created successfully."
          }
          
          # Create springcrm_crm database if it doesn't exist
          psql -h $PGHOST -p $PGPORT -U $PGUSER -d postgres -tc "SELECT 1 FROM pg_database WHERE datname = 'springcrm_crm'" | grep -q 1 || {
            echo "Creating springcrm_crm database..."
            psql -h $PGHOST -p $PGPORT -U $PGUSER -d postgres -c "CREATE DATABASE springcrm_crm OWNER $PGUSER;"
            echo "springcrm_crm database created successfully."
          }
          
          echo "Database initialization completed."
          
          # List all databases for verification
          echo "Current databases:"
          psql -h $PGHOST -p $PGPORT -U $PGUSER -d postgres -c "\l"