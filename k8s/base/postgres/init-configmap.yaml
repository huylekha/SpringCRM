apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-config
  labels:
    app: postgres
    component: database
data:
  init-databases.sh: |
    #!/bin/bash
    set -e
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" <<-EOSQL
      SELECT 'CREATE DATABASE springcrm_crm OWNER $POSTGRES_USER'
        WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'springcrm_crm')\gexec
    EOSQL
