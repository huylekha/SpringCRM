apiVersion: v1
kind: ConfigMap
metadata:
  name: springcrm-microservices-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  springcrm-microservices.json: |
    {
      "dashboard": {
        "id": null,
        "title": "SpringCRM Microservices - Pod Level Monitoring",
        "tags": ["springcrm", "microservices", "pods"],
        "timezone": "browser",
        "panels": [
          {
            "id": 1,
            "title": "Service Health by Environment",
            "type": "stat",
            "targets": [
              {
                "expr": "up{service_name=~\"auth-service|crm-service|api-gateway|frontend\"}",
                "legendFormat": "{{environment}}-{{service_name}}-{{pod_name}}"
              }
            ],
            "fieldConfig": {
              "defaults": {
                "color": {
                  "mode": "thresholds"
                },
                "thresholds": {
                  "steps": [
                    {"color": "red", "value": 0},
                    {"color": "green", "value": 1}
                  ]
                }
              }
            },
            "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0}
          },
          {
            "id": 2,
            "title": "Request Rate by Service and Environment",
            "type": "graph",
            "targets": [
              {
                "expr": "sum(rate(http_server_requests_total{service_name=~\"auth-service|crm-service|api-gateway\"}[5m])) by (environment, service_name)",
                "legendFormat": "{{environment}}-{{service_name}}"
              }
            ],
            "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0}
          },
          {
            "id": 3,
            "title": "Pod Memory Usage by Environment",
            "type": "graph",
            "targets": [
              {
                "expr": "container_memory_usage_bytes{pod=~\".*-(auth-service|crm-service|api-gateway|frontend)-.*\"} / 1024 / 1024",
                "legendFormat": "{{namespace}}-{{pod}}"
              }
            ],
            "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8}
          },
          {
            "id": 4,
            "title": "Pod CPU Usage by Environment",
            "type": "graph",
            "targets": [
              {
                "expr": "rate(container_cpu_usage_seconds_total{pod=~\".*-(auth-service|crm-service|api-gateway|frontend)-.*\"}[5m]) * 100",
                "legendFormat": "{{namespace}}-{{pod}}"
              }
            ],
            "gridPos": {"h": 8, "w": 12, "x": 12, "y": 8}
          },
          {
            "id": 5,
            "title": "Error Rate by Service and Environment",
            "type": "graph",
            "targets": [
              {
                "expr": "sum(rate(http_server_requests_total{service_name=~\"auth-service|crm-service|api-gateway\",status=~\"4..|5..\"}[5m])) by (environment, service_name)",
                "legendFormat": "{{environment}}-{{service_name}} (errors)"
              }
            ],
            "gridPos": {"h": 8, "w": 24, "x": 0, "y": 16}
          }
        ],
        "templating": {
          "list": [
            {
              "name": "environment",
              "type": "query",
              "query": "label_values(up{service_name=~\"auth-service|crm-service|api-gateway|frontend\"}, environment)",
              "refresh": 1,
              "includeAll": true,
              "multi": true
            },
            {
              "name": "service_name",
              "type": "query",
              "query": "label_values(up{environment=~\"$environment\"}, service_name)",
              "refresh": 1,
              "includeAll": true,
              "multi": true
            },
            {
              "name": "pod_name",
              "type": "query",
              "query": "label_values(up{environment=~\"$environment\",service_name=~\"$service_name\"}, pod_name)",
              "refresh": 1,
              "includeAll": true,
              "multi": true
            }
          ]
        },
        "time": {
          "from": "now-1h",
          "to": "now"
        },
        "refresh": "30s"
      }
    }