apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: springcrm-staging-services
  namespace: monitoring
  labels:
    environment: staging
    monitoring: springcrm
spec:
  selector:
    matchLabels:
      environment: staging
  namespaceSelector:
    matchNames:
    - staging
  endpoints:
  - port: http
    path: /actuator/prometheus
    interval: 30s
    scrapeTimeout: 10s
    relabelings:
    - sourceLabels: [__meta_kubernetes_pod_label_environment]
      targetLabel: environment
    - sourceLabels: [__meta_kubernetes_pod_label_service_name]
      targetLabel: service_name
    - sourceLabels: [__meta_kubernetes_pod_label_service_type]
      targetLabel: service_type
    - sourceLabels: [__meta_kubernetes_pod_name]
      targetLabel: pod_name
      regex: '(.+)'
      replacement: 'pod-${1}'
    - sourceLabels: [__meta_kubernetes_namespace]
      targetLabel: namespace
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: springcrm-staging-frontend
  namespace: monitoring
  labels:
    environment: staging
    monitoring: springcrm
    component: frontend
spec:
  selector:
    matchLabels:
      environment: staging
      component: frontend
  namespaceSelector:
    matchNames:
    - staging
  endpoints:
  - port: http
    path: /api/health
    interval: 30s
    scrapeTimeout: 10s
    relabelings:
    - sourceLabels: [__meta_kubernetes_pod_label_environment]
      targetLabel: environment
    - sourceLabels: [__meta_kubernetes_pod_label_service_name]
      targetLabel: service_name
    - sourceLabels: [__meta_kubernetes_pod_label_service_type]
      targetLabel: service_type
    - sourceLabels: [__meta_kubernetes_pod_name]
      targetLabel: pod_name
      regex: '(.+)'
      replacement: 'pod-${1}'
    - sourceLabels: [__meta_kubernetes_namespace]
      targetLabel: namespace