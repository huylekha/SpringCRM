apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: main-app-ingress
  namespace: dev
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization"
spec:
  rules:
  - host: springcrm.com
    http:
      paths:
      # Main application routes - points to dev frontend
      - path: /
        pathType: Prefix
        backend:
          service:
            name: dev-frontend
            port:
              number: 3000
      # Static assets and API routes for frontend
      - path: /_next
        pathType: Prefix
        backend:
          service:
            name: dev-frontend
            port:
              number: 3000
      - path: /favicon.ico
        pathType: Exact
        backend:
          service:
            name: dev-frontend
            port:
              number: 3000
      # Frontend API routes (Next.js API routes)
      - path: /api/health
        pathType: Prefix
        backend:
          service:
            name: dev-frontend
            port:
              number: 3000