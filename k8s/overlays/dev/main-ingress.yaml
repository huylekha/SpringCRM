apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: springcrm-main-ingress
  namespace: dev
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization"
spec:
  rules:
  - host: springcrm.com
    http:
      paths:
      # Main application routes (no rewrite)
      - path: /
        pathType: Exact
        backend:
          service:
            name: dev-frontend
            port:
              number: 3000
      - path: /login
        pathType: Prefix
        backend:
          service:
            name: dev-frontend
            port:
              number: 3000
      - path: /dashboard
        pathType: Prefix
        backend:
          service:
            name: dev-frontend
            port:
              number: 3000
      - path: /profile
        pathType: Prefix
        backend:
          service:
            name: dev-frontend
            port:
              number: 3000
      - path: /settings
        pathType: Prefix
        backend:
          service:
            name: dev-frontend
            port:
              number: 3000
      # API routes (no rewrite)
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: dev-api-gateway
            port:
              number: 8080