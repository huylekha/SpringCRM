# Secret patches for dev environment
# NOTE: In production, use SealedSecrets or SOPS for encrypted secrets
apiVersion: v1
kind: Secret
metadata:
  name: auth-service-secret
type: Opaque
stringData:
  DB_PASSWORD: "dev_crm_password"
  JWT_SECRET: "dev-jwt-secret-key-for-development-must-be-at-least-64-chars-long!!"
  SENTRY_DSN: ""  # Optional for dev
---
apiVersion: v1
kind: Secret
metadata:
  name: crm-service-secret
type: Opaque
stringData:
  DB_PASSWORD: "dev_crm_password"
  SENTRY_DSN: ""  # Optional for dev
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
type: Opaque
stringData:
  POSTGRES_PASSWORD: "dev_crm_password"
---
apiVersion: v1
kind: Secret
metadata:
  name: frontend-secret
type: Opaque
stringData:
  NEXTAUTH_SECRET: "dev-nextauth-secret-key-for-development-only-must-be-32-chars"
  SENTRY_DSN: ""  # Optional for dev