# ConfigMap patches for production environment
apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-service-config
data:
  DB_HOST: "prod-postgres"
  DB_NAME: "springcrm_auth"
  REDIS_HOST: "prod-redis"
  JWT_ISSUER: "crm-platform-prod"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: crm-service-config
data:
  DB_HOST: "prod-postgres"
  DB_NAME: "springcrm_crm"
  REDIS_HOST: "prod-redis"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
data:
  POSTGRES_DB: "springcrm_auth"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: api-gateway-config
data:
  REDIS_HOST: "prod-redis"
  AUTH_SERVICE_URL: "http://prod-auth-service:8081"
  CRM_SERVICE_URL: "http://prod-crm-service:8082"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-config
data:
  NEXT_PUBLIC_API_BASE_URL: "https://api.springcrm.com/v1"
  NEXTAUTH_URL: "https://springcrm.com"
  # Environment identifier for production
  NEXT_PUBLIC_ENVIRONMENT: "production"
  # Security settings for production
  NEXT_PUBLIC_SECURE_COOKIES: "true"
  # Legacy URLs for backward compatibility during migration
  LEGACY_API_BASE_URL: "https://springcrm.com/prod/api-gateway/api/v1"
  LEGACY_NEXTAUTH_URL: "https://springcrm.com/prod/frontend"