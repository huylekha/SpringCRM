apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: prod

resources:
- ../../base
- namespace.yaml
- api-gateway-ingress.yaml
- subdomain-ingress.yaml
- tls-wildcard-cert.yaml

patchesStrategicMerge:
- configmap-patches.yaml
- secret-patches.yaml
- resource-patches.yaml
- ingress-patch.yaml

images:
- name: localhost:5000/auth-service
  newTag: latest  # Will be updated by CI/CD
- name: localhost:5000/crm-service
  newTag: latest  # Will be updated by CI/CD
- name: localhost:5000/api-gateway
  newTag: latest  # Will be updated by CI/CD
- name: localhost:5000/frontend
  newTag: latest  # Will be updated by CI/CD

commonLabels:
  environment: prod

namePrefix: prod-

replicas:
- name: auth-service
  count: 3  # High availability for production
- name: crm-service
  count: 3
- name: api-gateway
  count: 3
- name: frontend
  count: 2