apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: main-app-ingress
  namespace: prod
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://springcrm.com,https://api.springcrm.com"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    nginx.ingress.kubernetes.io/server-snippet: |
      add_header X-Environment "prod" always;
      add_header X-Frame-Options "DENY" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-XSS-Protection "1; mode=block" always;
      add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
spec:
  tls:
  - hosts:
    - springcrm.com
    secretName: wildcard-springcrm-tls-secret
  rules:
  - host: springcrm.com
    http:
      paths:
      # Main application routes - points to prod frontend
      - path: /
        pathType: Prefix
        backend:
          service:
            name: prod-frontend
            port:
              number: 3000
      # Static assets and API routes for frontend
      - path: /_next
        pathType: Prefix
        backend:
          service:
            name: prod-frontend
            port:
              number: 3000
      - path: /favicon.ico
        pathType: Exact
        backend:
          service:
            name: prod-frontend
            port:
              number: 3000
      # Frontend API routes (Next.js API routes)
      - path: /api/health
        pathType: Prefix
        backend:
          service:
            name: prod-frontend
            port:
              number: 3000