[req]
distinguished_name = req_distinguished_name
req_extensions = v3_req
prompt = no

[req_distinguished_name]
CN = *.springcrm.com
O = SpringCRM
L = Local
ST = Development
C = US

[v3_req]
keyUsage = keyEncipherment, dataEncipherment
extendedKeyUsage = serverAuth
subjectAltName = @alt_names

[alt_names]
DNS.1 = springcrm.com
DNS.2 = *.springcrm.com
DNS.3 = api.springcrm.com
DNS.4 = grafana.springcrm.com
DNS.5 = prometheus.springcrm.com
DNS.6 = alertmanager.springcrm.com
DNS.7 = dev.springcrm.com
DNS.8 = staging.springcrm.com
DNS.9 = prod.springcrm.com
IP.1 = 127.0.0.1
IP.2 = ::1