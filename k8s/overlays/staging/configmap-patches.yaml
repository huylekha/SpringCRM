# ConfigMap patches for staging environment
apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-service-config
data:
  DB_NAME: "crm_platform_staging"
  JWT_ISSUER: "crm-platform-staging"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: crm-service-config
data:
  DB_NAME: "crm_platform_staging"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
data:
  POSTGRES_DB: "crm_platform_staging"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-config
data:
  NEXT_PUBLIC_API_BASE_URL: "http://springcrm.com/staging/api-gateway/api/v1"
  NEXTAUTH_URL: "http://springcrm.com/staging/frontend"