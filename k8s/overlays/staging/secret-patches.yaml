# Secret patches for staging environment
# NOTE: In production, use SealedSecrets or SOPS for encrypted secrets
apiVersion: v1
kind: Secret
metadata:
  name: auth-service-secret
type: Opaque
stringData:
  DB_PASSWORD: "staging_crm_password_change_me"
  JWT_SECRET: "staging-jwt-secret-key-change-me-must-be-at-least-64-chars-long!!"
  SENTRY_DSN: ""  # Set your staging Sentry DSN here
---
apiVersion: v1
kind: Secret
metadata:
  name: crm-service-secret
type: Opaque
stringData:
  DB_PASSWORD: "staging_crm_password_change_me"
  SENTRY_DSN: ""  # Set your staging Sentry DSN here
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
type: Opaque
stringData:
  POSTGRES_PASSWORD: "staging_crm_password_change_me"
---
apiVersion: v1
kind: Secret
metadata:
  name: frontend-secret
type: Opaque
stringData:
  NEXTAUTH_SECRET: "staging-nextauth-secret-change-me-32-chars"
  SENTRY_DSN: ""  # Set your staging Sentry DSN here